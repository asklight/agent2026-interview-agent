server:
  address: 0.0.0.0
  port: 8080

spring:
  application:
    name: interview-agent-server
  profiles:
    active: dev
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
    clean-disabled: true
    encoding: UTF-8

logging:
  level:
    com.agent2026.interview: info

security:
  rate-limit:
    enabled: true
    requests-per-window: 30
    window: 1m
    max-tracked-clients: 10000
